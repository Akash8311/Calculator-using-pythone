<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOVA CALC — Animated Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --bg:         #06070f;
  --surface:    #0c0e1c;
  --surface2:   #111426;
  --border:     rgba(255,255,255,0.06);
  --accent:     #6d28d9;
  --accent-b:   #0ea5e9;
  --accent-c:   #ec4899;
  --glow-v:     rgba(109,40,217,0.4);
  --glow-b:     rgba(14,165,233,0.4);
  --white:      #eef2ff;
  --muted:      #4b5380;
  --cyan:       #38bdf8;
  --violet:     #a78bfa;
  --rose:       #fb7185;
  --green:      #34d399;
  --font-ui:    'Space Mono', monospace;
  --font-head:  'Syne', sans-serif;

  /* responsive sizing tokens */
  --app-w:      420px;
  --btn-h:      56px;
  --btn-r:      12px;
  --btn-fs:     14px;
  --disp-h:     130px;
  --disp-fs:    42px;
  --pad:        14px;
  --gap:        7px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height: 100%; }

body {
  height: 100%;
  background: var(--bg);
  font-family: var(--font-ui);
  overflow-x: hidden;
  color: var(--white);
}

/* ══════════════════════════════════════════
   CANVAS BACKGROUND
══════════════════════════════════════════ */
#bg {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}

/* ══════════════════════════════════════════
   LAYOUT SHELL
══════════════════════════════════════════ */
#shell {
  position: relative; z-index: 10;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 16px;
}

/* ── LAPTOP: two-column layout ── */
.layout {
  display: grid;
  grid-template-columns: 1fr var(--app-w);
  grid-template-rows: auto;
  gap: 32px;
  width: 100%;
  max-width: 960px;
  align-items: center;
}

/* ── INFO PANEL (left col) ── */
.info-panel {
  display: flex;
  flex-direction: column;
  gap: 28px;
  padding: 0 12px;
  animation: slideLeft .8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideLeft {
  from { opacity:0; transform: translateX(-32px); }
  to   { opacity:1; transform: none; }
}

.logo-row {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent-b));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 24px var(--glow-v);
  flex-shrink: 0;
}
.logo-name {
  font-family: var(--font-head);
  font-size: 26px; font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(90deg, var(--violet), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.tagline {
  font-family: var(--font-head);
  font-size: 40px; font-weight: 800;
  line-height: 1.15;
  letter-spacing: -1.5px;
}
.tagline span { color: var(--violet); }

.desc {
  font-size: 13px; color: var(--muted);
  line-height: 1.8; max-width: 340px;
  letter-spacing: .3px;
}

.features {
  display: flex; flex-direction: column; gap: 10px;
}
.feat {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--muted);
}
.feat-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.feat-dot.v { background: var(--violet); box-shadow: 0 0 8px var(--violet); }
.feat-dot.b { background: var(--cyan);   box-shadow: 0 0 8px var(--cyan); }
.feat-dot.r { background: var(--rose);   box-shadow: 0 0 8px var(--rose); }
.feat-dot.g { background: var(--green);  box-shadow: 0 0 8px var(--green); }

.stat-row {
  display: flex; gap: 20px;
}
.stat {
  display: flex; flex-direction: column; gap: 2px;
}
.stat-num {
  font-family: var(--font-head);
  font-size: 22px; font-weight: 900;
  color: var(--white);
}
.stat-lbl {
  font-size: 9px; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
}

/* ══════════════════════════════════════════
   CALCULATOR CARD
══════════════════════════════════════════ */
.calc-card {
  width: var(--app-w);
  background: var(--surface);
  border-radius: 24px;
  border: 1px solid var(--border);
  padding: var(--pad);
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow:
    0 0 0 1px rgba(109,40,217,0.15),
    0 32px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(109,40,217,0.08);
  animation: popIn .7s cubic-bezier(.16,1,.3,1) .1s both;
  position: relative;
}
@keyframes popIn {
  from { opacity:0; transform: translateY(24px) scale(.97); }
  to   { opacity:1; transform: none; }
}

/* top bar glow line */
.calc-card::before {
  content: '';
  position: absolute; top:0; left: 15%; right: 15%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--violet), var(--cyan), transparent);
  border-radius: 0 0 4px 4px;
  opacity: .6;
}

/* ── TITLE BAR ── */
.tbar {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 2px 4px;
}
.tbar-title {
  font-family: var(--font-head);
  font-size: 11px; font-weight: 800;
  letter-spacing: 3px;
  color: var(--violet);
  text-shadow: 0 0 10px rgba(167,139,250,.5);
}
.tbar-btns { display: flex; gap: 5px; }
.tbar-btn {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 5px;
  padding: 3px 9px;
  font-family: var(--font-ui); font-size: 9px;
  letter-spacing: 1.5px; color: var(--muted);
  cursor: pointer; transition: all .2s;
}
.tbar-btn:hover  { color: var(--violet); border-color: rgba(167,139,250,.3); }
.tbar-btn.active { color: var(--cyan);   border-color: rgba(56,189,248,.4); background: rgba(14,165,233,.06); }

/* ── DISPLAY ── */
.disp-wrap {
  position: relative; border-radius: 16px; padding: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent-b), var(--accent-c), var(--accent));
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
}
@keyframes borderFlow {
  0%   { background-position:   0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position:   0% 50%; }
}
.disp {
  background: #060810;
  border-radius: 14px;
  height: var(--disp-h);
  padding: 12px 18px 10px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  position: relative; overflow: hidden;
}
.disp::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 2px,
    rgba(255,255,255,.008) 2px, rgba(255,255,255,.008) 3px);
  pointer-events: none;
}
.disp-expr    { font-size: 10px; color: var(--muted); text-align: right; min-height: 13px; letter-spacing: .5px; }
.disp-result  {
  font-family: var(--font-head);
  font-size: var(--disp-fs); font-weight: 800;
  color: var(--white); text-align: right;
  text-shadow: 0 0 28px rgba(167,139,250,.3);
  transition: color .25s, font-size .1s;
  word-break: break-all; line-height: 1;
}
.disp-preview { font-size: 11px; color: var(--violet); text-align: right; min-height: 14px; }

.flash-g .disp-result { color: var(--green) !important; text-shadow: 0 0 28px rgba(52,211,153,.5) !important; }
.flash-r .disp-result { color: var(--rose)  !important; text-shadow: 0 0 28px rgba(251,113,133,.5) !important; }

/* ── HISTORY ── */
.hist {
  background: rgba(6,7,15,.92);
  border: 1px solid rgba(56,189,248,.18);
  border-radius: 12px;
  padding: 0 12px;
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .38s cubic-bezier(.16,1,.3,1), opacity .25s, padding .3s;
}
.hist.open { max-height: 150px; opacity: 1; padding: 8px 12px; overflow-y: auto; }
.hist::-webkit-scrollbar { width: 3px; }
.hist::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
.hist-hdr {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 9px; color: var(--cyan); letter-spacing: 2px; margin-bottom: 5px;
}
.hist-clr { background: none; border: none; color: var(--muted); font-family: var(--font-ui); font-size: 9px; cursor: pointer; }
.hist-clr:hover { color: var(--rose); }
.hist-item { font-size: 10px; color: var(--muted); padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,.03); cursor: pointer; text-align: right; transition: color .2s; }
.hist-item:hover { color: var(--violet); }

/* ── BUTTON GRID ── */
.btn-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--gap);
}

/* ── BUTTONS ── */
.btn {
  height: var(--btn-h);
  border: none; border-radius: var(--btn-r);
  font-family: var(--font-ui);
  font-size: var(--btn-fs); font-weight: 700;
  letter-spacing: .3px;
  cursor: pointer; position: relative; overflow: hidden;
  outline: none; transition: transform .08s, box-shadow .18s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.08) 0%, transparent 60%);
  pointer-events: none; border-radius: inherit;
}
.btn:active { transform: scale(.86); }

.b-num  { background: var(--surface2); color: var(--white);  border: 1px solid rgba(255,255,255,.05); }
.b-num:hover  { background: #161930; box-shadow: 0 0 12px rgba(109,40,217,.2); }

.b-mid  { background: #131628; color: var(--white);  border: 1px solid rgba(255,255,255,.07); }

.b-op   { background: #110d2a; color: var(--violet); border: 1px solid rgba(109,40,217,.2); }
.b-op:hover   { box-shadow: 0 0 18px rgba(109,40,217,.45); border-color: rgba(109,40,217,.5); }

.b-fn   { background: #050e18; color: var(--cyan);   border: 1px solid rgba(14,165,233,.14); }
.b-fn:hover   { box-shadow: 0 0 16px rgba(14,165,233,.4); border-color: rgba(14,165,233,.45); }

.b-eq   {
  background: linear-gradient(145deg, #3b0764, #6d28d9);
  color: var(--white); border: 1px solid rgba(167,139,250,.3);
  box-shadow: 0 0 24px rgba(109,40,217,.5);
  font-size: calc(var(--btn-fs) + 2px);
}
.b-eq:hover   { box-shadow: 0 0 36px rgba(109,40,217,.8); }

.b-clr  { background: #190608; color: var(--rose);   border: 1px solid rgba(251,113,133,.18); }
.b-clr:hover  { box-shadow: 0 0 16px rgba(251,113,133,.4); }

/* ripple */
.rip { position:absolute; border-radius:50%; background:rgba(255,255,255,.22); transform:scale(0); animation: ripa .5s ease-out forwards; pointer-events:none; }
@keyframes ripa { to { transform: scale(4); opacity:0; } }

/* ══════════════════════════════════════════
   SHAKE
══════════════════════════════════════════ */
.shake { animation: shk .38s ease-out; }
@keyframes shk {
  0%,100%{ transform:translateX(0) }
  15%    { transform:translateX(-10px) }
  30%    { transform:translateX(10px) }
  45%    { transform:translateX(-7px) }
  60%    { transform:translateX(7px) }
  75%    { transform:translateX(-3px) }
  90%    { transform:translateX(3px) }
}

/* ══════════════════════════════════════════
   RESPONSIVE — TABLET
══════════════════════════════════════════ */
@media (max-width: 860px) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
    max-width: 480px;
    margin: 0 auto;
    gap: 20px;
  }
  .info-panel {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 14px;
    padding: 0;
    align-items: center;
  }
  .logo-row { flex-shrink: 0; }
  .tagline  { display: none; }
  .desc     { display: none; }
  .stat-row { margin-left: auto; }
  .features { flex-direction: row; flex-wrap: wrap; gap: 8px 16px; }
}

/* ══════════════════════════════════════════
   RESPONSIVE — PHONE ≤ 480px
══════════════════════════════════════════ */
@media (max-width: 480px) {
  :root {
    --app-w:    100%;
    --btn-h:    50px;
    --btn-fs:   13px;
    --disp-h:   116px;
    --disp-fs:  34px;
    --pad:      10px;
    --gap:      5px;
  }
  #shell { padding: 12px 8px; }
  .layout { max-width: 100%; gap: 10px; }
  .calc-card { border-radius: 18px; }
  .info-panel { gap: 10px; }
  .stat-row { gap: 14px; }
  .stat-num { font-size: 18px; }
  .features { display: none; }
}

/* ══════════════════════════════════════════
   RESPONSIVE — LARGE LAPTOP ≥ 1200px
══════════════════════════════════════════ */
@media (min-width: 1200px) {
  :root {
    --app-w:   460px;
    --btn-h:   60px;
    --btn-fs:  15px;
    --disp-h:  145px;
    --disp-fs: 46px;
    --gap:     8px;
    --pad:     16px;
  }
  .layout { max-width: 1100px; gap: 48px; }
  .tagline { font-size: 48px; }
}

/* ══════════════════════════════════════════
   RESPONSIVE — 4K / ULTRAWIDE ≥ 1600px
══════════════════════════════════════════ */
@media (min-width: 1600px) {
  :root {
    --app-w:   500px;
    --btn-h:   65px;
    --btn-fs:  16px;
    --disp-fs: 52px;
    --disp-h:  160px;
  }
  .layout { max-width: 1300px; }
  .tagline { font-size: 56px; }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="shell">
  <div class="layout">

    <!-- ── INFO PANEL (hidden on small mobile) ── -->
    <aside class="info-panel">
    

     
      <p class="desc">
        A fully animated scientific calculator with particle effects,
        plasma background, glow buttons, and real-time preview —
        built for both desktop and mobile.
      </p>

  
<!-- 
      <div class="stat-row">
        <div class="stat">
          <div class="stat-num" style="color:var(--violet)"></div>
          <div class="stat-lbl">Buttons</div>
        </div>
        <div class="stat">
          <div class="stat-num" style="color:var(--cyan)">∞</div>
          <div class="stat-lbl">Precision</div>
        </div>
        <div class="stat">
          <div class="stat-num" style="color:var(--rose)">60</div>
          <div class="stat-lbl">FPS</div>
        </div>
      </div> -->
    </aside>

    <!-- ── CALCULATOR CARD ── -->
    <div class="calc-card" id="calc-card">
      <!-- Title bar -->
      <div class="tbar">
        <span class="tbar-title">NOVA CALC</span>
        <div class="tbar-btns">
          <button class="tbar-btn active" id="deg-btn" onclick="toggleDeg()">DEG</button>
          <button class="tbar-btn"        id="hist-btn" onclick="toggleHist()">HIST</button>
        </div>
      </div>

      <!-- Display -->
      <div class="disp-wrap">
        <div class="disp" id="disp">
          <div class="disp-expr"    id="d-expr"></div>
          <div class="disp-result"  id="d-result">0</div>
          <div class="disp-preview" id="d-preview"></div>
        </div>
      </div>

      <!-- History -->
      <div class="hist" id="hist">
        <div class="hist-hdr">
          <span>HISTORY</span>
          <button class="hist-clr" onclick="clearHist()">CLEAR</button>
        </div>
        <div id="hist-list"></div>
      </div>

      <!-- Buttons -->
      <div class="btn-grid" id="btn-grid"></div>
    </div>

  </div><!-- /layout -->
</div><!-- /shell -->

<script>
/* ═══════════════════════════════════════════
   ANIMATED BACKGROUND CANVAS
═══════════════════════════════════════════ */
const bgC  = document.getElementById('bg');
const bgX  = bgC.getContext('2d');
let W, H, F = 0;

const orbs = Array.from({length:7}, () => ({
  x: Math.random()*1400, y: Math.random()*900,
  r: 90 + Math.random()*150,
  vx: (Math.random()-.5)*.6, vy: (Math.random()-.5)*.6,
  hue: [270,200,320][Math.floor(Math.random()*3)],
  phase: Math.random()*Math.PI*2,
}));

let dots = [], burstPs = [];

function resize(){
  W = bgC.width  = window.innerWidth;
  H = bgC.height = window.innerHeight;
}
resize(); window.addEventListener('resize', resize);

function bgTick(){
  F++;
  bgX.clearRect(0,0,W,H);
  bgX.fillStyle='#06070f'; bgX.fillRect(0,0,W,H);

  /* grid */
  bgX.strokeStyle='rgba(109,40,217,0.04)'; bgX.lineWidth=.7;
  for(let x=0;x<W;x+=62){bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,H);bgX.stroke();}
  for(let y=0;y<H;y+=62){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(W,y);bgX.stroke();}

  /* orbs */
  orbs.forEach(o=>{
    o.x+=o.vx; o.y+=o.vy;
    if(o.x<-o.r||o.x>W+o.r) o.vx*=-1;
    if(o.y<-o.r||o.y>H+o.r) o.vy*=-1;
    const a=.04+.022*Math.sin(F*.035+o.phase);
    const g=bgX.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    g.addColorStop(0,`hsla(${o.hue},72%,58%,${a})`);
    g.addColorStop(1,'transparent');
    bgX.fillStyle=g; bgX.beginPath(); bgX.arc(o.x,o.y,o.r,0,Math.PI*2); bgX.fill();
  });

  /* rising dots */
  if(F%4===0&&dots.length<80){
    dots.push({
      x:Math.random()*W, y:H+5,
      vx:(Math.random()-.5)*.4, vy:-(0.5+Math.random()*1.4),
      life:1, size:1.2+Math.random()*2.8,
      col:['rgba(167,139,250','rgba(56,189,248','rgba(52,211,153'][Math.random()*3|0],
      d:.003+Math.random()*.005,
    });
  }
  dots=dots.filter(d=>{
    d.x+=d.vx; d.y+=d.vy; d.life-=d.d;
    if(d.life<=0||d.y<-10) return false;
    bgX.globalAlpha=d.life*.7;
    bgX.fillStyle=`${d.col},${d.life})`;
    bgX.beginPath(); bgX.arc(d.x,d.y,d.size,0,Math.PI*2); bgX.fill();
    bgX.globalAlpha=1; return true;
  });

  /* burst particles */
  burstPs=burstPs.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.2; p.vx*=.95; p.life-=.038;
    if(p.life<=0) return false;
    bgX.globalAlpha=p.life;
    bgX.fillStyle=`${p.col},${p.life})`;
    bgX.beginPath(); bgX.arc(p.x,p.y,p.size,0,Math.PI*2); bgX.fill();
    bgX.globalAlpha=1; return true;
  });

  requestAnimationFrame(bgTick);
}
bgTick();

function spawnBurst(x,y,col='rgba(167,139,250'){
  for(let i=0;i<22;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*6;
    burstPs.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col,size:1.5+Math.random()*3});
  }
}

/* ═══════════════════════════════════════════
   BUTTON DEFINITIONS
═══════════════════════════════════════════ */
const LAYOUT=[
  [['sin','b-fn'],['cos','b-fn'],['tan','b-fn'],['log','b-fn'],['ln','b-fn']],
  [['√','b-fn'],  ['x²','b-fn'], ['xʸ','b-fn'], ['π','b-fn'],  ['e','b-fn']],
  [['1/x','b-fn'],['(','b-mid'],[')','b-mid'],  ['%','b-op'],  ['AC','b-clr']],
  [['7','b-num'], ['8','b-num'], ['9','b-num'],  ['⌫','b-mid'], ['÷','b-op']],
  [['4','b-num'], ['5','b-num'], ['6','b-num'],  ['+','b-op'],  ['−','b-op']],
  [['1','b-num'], ['2','b-num'], ['3','b-num'],  ['×','b-op'],  ['±','b-mid']],
  [['0','b-num'], ['00','b-mid'],['.','b-mid'],  ['ANS','b-mid'],['=','b-eq']],
];

const grid=document.getElementById('btn-grid');
LAYOUT.forEach(row=>row.forEach(([lbl,cls])=>{
  const b=document.createElement('button');
  b.className='btn '+cls; b.textContent=lbl;
  b.addEventListener('pointerdown',e=>{
    const rect=b.getBoundingClientRect();
    const rip=document.createElement('div'); rip.className='rip';
    const sz=Math.max(rect.width,rect.height);
    Object.assign(rip.style,{width:sz+'px',height:sz+'px',
      left:(e.clientX-rect.left-sz/2)+'px',top:(e.clientY-rect.top-sz/2)+'px'});
    b.appendChild(rip); rip.addEventListener('animationend',()=>rip.remove());
    spawnBurst(e.clientX,e.clientY, lbl==='='?'rgba(52,211,153':'rgba(167,139,250');
    handleBtn(lbl);
  });
  grid.appendChild(b);
}));

/* ═══════════════════════════════════════════
   CALC LOGIC
═══════════════════════════════════════════ */
let expr='', justCalc=false, degMode=true, histOpen=false;
const histLog=[];

const dExpr=document.getElementById('d-expr');
const dRes =document.getElementById('d-result');
const dPrev=document.getElementById('d-preview');
const dDisp=document.getElementById('disp');

function setDisplay(ex,res,prev){
  dExpr.textContent=ex||'';
  dRes.textContent =res||'0';
  dPrev.textContent=prev||'';
  const n=(res||'0').length;
  const base=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--disp-fs'));
  dRes.style.fontSize=(n<10?base:n<16?Math.round(base*.7):Math.round(base*.46))+'px';
}
function updateDisplay(){
  const t=expr||'0';
  let prev='';
  if(expr&&!justCalc){try{prev='= '+compute(expr);}catch{}}
  setDisplay(justCalc?expr:'',t,prev);
}
function flashDisp(type){
  dDisp.classList.remove('flash-g','flash-r');
  void dDisp.offsetWidth;
  dDisp.classList.add(type==='g'?'flash-g':'flash-r');
  setTimeout(()=>dDisp.classList.remove('flash-g','flash-r'),420);
}
function rollIn(){
  dRes.style.color='var(--cyan)'; dRes.style.opacity='0';
  requestAnimationFrame(()=>{
    dRes.style.transition='opacity .22s ease-out, color .3s';
    dRes.style.opacity='1';
    setTimeout(()=>{dRes.style.color='var(--white)'; dRes.style.transition='';},260);
  });
}
function shakeCard(){
  const c=document.getElementById('calc-card');
  c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake');
  c.addEventListener('animationend',()=>c.classList.remove('shake'),{once:true});
}

function compute(raw){
  let e=raw
    .replace(/π/g,String(Math.PI))
    .replace(/(?<![a-z])e(?![a-z])/g,String(Math.E))
    .replace(/²/g,'**2').replace(/\^/g,'**')
    .replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
  if(degMode){
    e=e.replace(/sin\(/g,'Math.sin(Math.PI/180*')
       .replace(/cos\(/g,'Math.cos(Math.PI/180*')
       .replace(/tan\(/g,'Math.tan(Math.PI/180*');
  }else{
    e=e.replace(/sin\(/g,'Math.sin(').replace(/cos\(/g,'Math.cos(').replace(/tan\(/g,'Math.tan(');
  }
  e=e.replace(/log\(/g,'Math.log10(').replace(/ln\(/g,'Math.log(').replace(/√\(/g,'Math.sqrt(');
  const r=Function('"use strict";return('+e+')')();
  if(!isFinite(r)) throw new Error();
  return typeof r==='number'
    ?(r%1===0&&Math.abs(r)<1e15?String(r):parseFloat(r.toPrecision(10)).toString())
    :String(r);
}

function handleBtn(a){
  if(a==='AC'){expr='';justCalc=false;flashDisp('r');updateDisplay();return;}
  if(a==='⌫'){expr=expr.slice(0,-1);updateDisplay();return;}
  if(a==='='){evaluate();return;}
  if(a==='±'){expr=expr?`-(${expr})`:'-';justCalc=false;updateDisplay();return;}
  if(a==='ANS'){
    if(histLog.length){const v=histLog[0].split('=').pop().trim();expr=justCalc?v:expr+v;justCalc=false;updateDisplay();}
    return;
  }
  if(a==='π'){expr=justCalc?'π':expr+'π';justCalc=false;updateDisplay();return;}
  if(a==='e'){expr=justCalc?'e':expr+'e';justCalc=false;updateDisplay();return;}
  if(a==='x²'){expr+='²';justCalc=false;updateDisplay();return;}
  if(a==='xʸ'){expr+='^';justCalc=false;updateDisplay();return;}
  if(a==='1/x'){expr=(justCalc&&expr)?`1/(${expr})`:expr+'1/';justCalc=false;updateDisplay();return;}
  if(['sin','cos','tan','log','ln','√'].includes(a)){
    expr=(justCalc&&expr)?`${a}(${expr})`:expr+`${a}(`;
    justCalc=false;updateDisplay();return;
  }
  if(justCalc&&!'+-×−÷/'.includes(a)) expr='';
  expr+=a; justCalc=false; updateDisplay();
}

function evaluate(){
  if(!expr) return;
  try{
    const r=compute(expr);
    histLog.unshift(`${expr} = ${r}`);
    if(histLog.length>20) histLog.pop();
    setDisplay(expr,r,''); rollIn(); flashDisp('g');
    expr=r; justCalc=true;
    if(histOpen) refreshHist();
  }catch{
    shakeCard(); flashDisp('r');
    dRes.textContent='Error'; dRes.style.color='var(--rose)';
    expr=''; justCalc=false;
    setTimeout(()=>{dRes.style.color='var(--white)';updateDisplay();},750);
  }
}

function toggleDeg(){
  degMode=!degMode;
  const b=document.getElementById('deg-btn');
  b.textContent=degMode?'DEG':'RAD';
}
function toggleHist(){
  histOpen=!histOpen;
  document.getElementById('hist').classList.toggle('open',histOpen);
  document.getElementById('hist-btn').classList.toggle('active',histOpen);
  if(histOpen) refreshHist();
}
function refreshHist(){
  const l=document.getElementById('hist-list');
  if(!histLog.length){l.innerHTML='<div class="hist-item" style="cursor:default">No history yet.</div>';return;}
  l.innerHTML=histLog.slice(0,12).map(h=>{
    const v=h.split('=').pop().trim();
    return `<div class="hist-item" onclick="restoreHist('${v.replace(/'/g,"\\'")}')">${h}</div>`;
  }).join('');
}
function restoreHist(v){expr=v;justCalc=false;updateDisplay();}
function clearHist(){histLog.length=0;refreshHist();}

/* keyboard */
document.addEventListener('keydown',e=>{
  if('0123456789.+-*/()%'.includes(e.key)){handleBtn(e.key);return;}
  if(e.key==='Enter')    handleBtn('=');
  if(e.key==='Backspace')handleBtn('⌫');
  if(e.key==='Escape')   handleBtn('AC');
});

updateDisplay();
</script>
</body>
